{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NoteShare{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'notes/styles.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'group_list' %}" aria-label="NoteShare dashboard">
            <span class="brand-mark">N</span>
            <span>NoteShare</span>
        </a>

        <nav class="nav-actions">
            {% if user.is_authenticated %}
                <span class="user-chip">{{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button class="button ghost" type="submit">Log out</button>
                </form>
            {% else %}
                <a class="button ghost" href="{% url 'login' %}">Log in</a>
                <a class="button" href="{% url 'signup' %}">Sign up</a>
            {% endif %}
        </nav>
    </header>

    <main class="page">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p class="message {{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
